apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local   # 👈 important
  hostPath:
    path: /data/postgres     # 👈 only works on local clusters (e.g. Minikube)
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local   # 👈 must match PV
  resources:
    requests:
      storage: 1Gi
