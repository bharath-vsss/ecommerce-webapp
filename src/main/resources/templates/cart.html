<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Shopping Cart - E-commerce Store</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="/">E-commerce</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
      </ul>
    </div>
  </nav>
  <h2 class="mt-4">Shopping Cart</h2>
  <table class="table">
    <thead>
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${cartItems}">
      <td th:text="${item.product.name}">Product Name</td>
      <td>$<span th:text="${item.product.price}">0.00</span></td>
      <td th:text="${item.quantity}">1</td>
      <td>$<span th:text="${item.totalPrice}">0.00</span></td>
      <td>
        <form th:action="@{'/cart/remove/' + ${item.product.id}}" method="post">
          <button type="submit" class="btn btn-danger btn-sm">Remove</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
  <h4>Total: $<span th:text="${total}">0.00</span></h4>
  <a href="/products" class="btn btn-primary">Continue Shopping</a>
</div>
</body>
</html>
