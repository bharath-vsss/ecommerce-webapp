# Default values for ecommerce app.

replicaCount: 1

image:
  repository: "510931056289.dkr.ecr.ap-southeast-2.amazonaws.com/devops_repo/app"
  pullPolicy: IfNotPresent
  tag: "" # Overridden dynamically by Jenkins pipeline via --set image.tag

imagePullSecrets:
  - name: ecr-registry-secret

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

# Probe configurations
probes:
  path: /health
  startup:
    initialDelaySeconds: 30
    failureThreshold: 6
    periodSeconds: 10
  liveness:
    periodSeconds: 10
    timeoutSeconds: 2
  readiness:
    periodSeconds: 10
    timeoutSeconds: 2

# Environment variables from ConfigMaps and Secrets
envFrom:
  configMaps:
    - app-config
  secrets:
    - ecommerce-db-secret

# Resource limits and requests
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Application Configuration
configData:
  DB_URL: "jdbc:postgresql://postgres-service:5432/ecommercedb"
  DB_USERNAME: "postgres"

# Horizontal Pod Autoscaler Configuration
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: ecommerce.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: gateway-service
          servicePort: 8080

# Consolidated PostgreSQL Configuration
postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "13"
    pullPolicy: IfNotPresent
  config:
    dbName: "ecommercedb"
    user: "postgres"
    secretName: "ecommerce-db-secret"
    secretKey: "DB_PASSWORD"
  persistence:
    enabled: true
    claimName: "postgres-pvc"
    pvName: "postgres-pv"
    storageClass: "local"
    accessMode: "ReadWriteOnce"
    reclaimPolicy: "Retain"
    pvStorage: "5Gi"
    pvcStorage: "1Gi"
    hostPath: "/data/postgres"
    mountPath: "/var/lib/postgresql/data"
  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432
  nodeSelector: {}

# Student Application Storage Configuration
studentApp:
  persistence:
    enabled: true
    pvName: "studentapp-pv"
    pvcName: "studentapp-pvc"
    storageClass: "local"
    accessMode: "ReadWriteOnce"
    capacity: "5Gi"
    pvcStorage: "2Gi"
    hostPath: "/opt/studentapp/data"
    labels:
      volume: "test"

# Application Secrets
secretsData:
  DB_PASSWORD: c2VjcmV0

# --- Gateway Configuration Sections ---
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: "510931056289.dkr.ecr.ap-southeast-2.amazonaws.com/devops_repo/app"
    tag: "0.0.1-SNAPSHOT" 
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  env:
    ecommerceServiceUrl: "http://ecommerce-service.default.svc.cluster.local:8081"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  probes:
    startup:
      initialDelaySeconds: 20
      failureThreshold: 6
      periodSeconds: 5
    liveness:
      periodSeconds: 10
      timeoutSeconds: 2
    readiness:
      periodSeconds: 10
      timeoutSeconds: 2
