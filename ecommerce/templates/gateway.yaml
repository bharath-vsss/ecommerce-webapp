{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  labels:
    app: gateway-deployment
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.service.targetPort }}
          
          # Probes Configuration
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.service.targetPort }}
            initialDelaySeconds: {{ .Values.gateway.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.gateway.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.gateway.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.service.targetPort }}
            periodSeconds: {{ .Values.gateway.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.service.targetPort }}
            periodSeconds: {{ .Values.gateway.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.readiness.timeoutSeconds }}
          
          # Environment Variables
          env:
            - name: ECOMMERCE_SERVICE_URL
              value: {{ .Values.gateway.env.ecommerceServiceUrl | quote }}
          
          # Resource Quotas
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.service.targetPort }}
{{- end }}
