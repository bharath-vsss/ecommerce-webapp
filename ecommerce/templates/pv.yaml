{{- if .Values.studentApp.persistence.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.studentApp.persistence.pvName }}
  labels:
    {{- with .Values.studentApp.persistence.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  storageClassName: {{ .Values.studentApp.persistence.storageClass | quote }}
  accessModes:
    - {{ .Values.studentApp.persistence.accessMode }}
  capacity:
    storage: {{ .Values.studentApp.persistence.capacity }}
  hostPath:
    path: {{ .Values.studentApp.persistence.hostPath | quote }}
{{- end }}