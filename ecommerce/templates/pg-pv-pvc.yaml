{{- if and .Values.postgres.enabled .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.postgres.persistence.pvName }}
  labels:
    app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
spec:
  capacity:
    storage: {{ .Values.postgres.persistence.pvStorage }}
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  persistentVolumeReclaimPolicy: {{ .Values.postgres.persistence.reclaimPolicy }}
  hostPath:
    path: {{ .Values.postgres.persistence.hostPath | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.postgres.persistence.claimName }}
  labels:
    app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
spec:
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.pvcStorage }}
{{- end }}