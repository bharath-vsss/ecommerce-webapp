{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
  labels:
    app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
    spec:
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgres.service.targetPort }}
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.config.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.config.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.config.secretName }}
                  key: {{ .Values.postgres.config.secretKey }}
          volumeMounts:
            - mountPath: {{ .Values.postgres.persistence.mountPath }}
              name: postgres-storage
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ .Values.postgres.persistence.claimName }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
spec:
  type: {{ .Values.postgres.service.type }}
  selector:
    app: {{ include "ecommerce.fullname" . | default .Release.Name }}-postgres
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.targetPort }}
{{- end }}